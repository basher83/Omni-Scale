# rumdl configuration - INCLUSION-BASED approach
# Only lint user-facing documentation

[global]
respect_gitignore = true

# Only lint user-facing repository READMEs.
include = [
    "README.md",
    "clusters/README.md",
    "machine-classes/README.md",
    "scripts/README.md",
]

[MD013]
line_length = 120
code_blocks = false
tables = false
headings = true

[MD033]
allowed_elements = ["span", "div", "Tip", "example", "commentary"]
