default_install_hook_types:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-added-large-files
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      - id: check-executables-have-shebangs
      - id: check-ast
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --severity=warning
        language: system
        types: [shell]

      - id: shfmt
        name: shfmt check
        entry: shfmt -d -i 2 -ci
        language: system
        types: [shell]

      - id: rumdl
        name: rumdl check
        entry: rumdl check
        language: system
        files: ^(README\.md|clusters/README\.md|machine-classes/README\.md|scripts/README\.md)$

      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$

      - id: omni-template-validate
        name: validate Omni cluster templates
        entry: mise run validate:omni
        language: system
        files: ^clusters/.*\.ya?ml$
        pass_filenames: false

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 42.70.2
    hooks:
      - id: renovate-config-validator
        args: [--strict]
