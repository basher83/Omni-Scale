name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install quality-gate tools
        uses: jdx/mise-action@v4
        with:
          cache: true
          cache_save: ${{ github.event_name != 'pull_request' }}
          install_args: >-
            pre-commit
            shellcheck
            shfmt
            pipx:rumdl
            actionlint
            omnictl

      - name: Run quality gate
        run: mise run check
